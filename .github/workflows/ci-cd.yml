name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch tokenizers datasets matplotlib pytest

      - name: Check Python syntax
        run: |
          python -m compileall BaseTrainer.py TrainingObserver.py TransformerTrainer.py checkpoint.py config.py dataset.py generate_samples.py transformer tokenizer

      - name: Run model smoke test
        run: |
          python - <<'PY'
          import torch

          from dataset import LMDataset
          from transformer.TransformerBuilder import TransformerModelBuilder

          token_ids = list(range(32))
          dataset = LMDataset(token_ids, seq_len=8, stride=8)
          x, y = dataset[0]
          assert x.shape == (8,)
          assert y.shape == (8,)

          model = (
              TransformerModelBuilder()
              .with_vocab_size(64)
              .with_max_seq_len(8)
              .with_d_model(16)
              .with_n_heads(4)
              .with_n_layers(2)
              .with_d_ff(32)
              .with_dropout(0.1)
              .build()
          )

          logits = model(x.unsqueeze(0))
          assert logits.shape == (1, 8, 64)
          assert torch.isfinite(logits).all()
          print("Smoke test passed.")
          PY

  cd:
    name: Package Project Artifact
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: small-scale-gpt2-project
          path: |
            *.py
            readme.md
            requirements.txt
            transformer/**
            tokenizer/**
          if-no-files-found: error
