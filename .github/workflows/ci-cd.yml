name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch tokenizers datasets matplotlib pytest

      - name: Check Python syntax
        run: |
           python -m compileall BaseTrainer.py TrainingObserver.py TransformerTrainer.py checkpoint.py config.py dataset.py generate_samples.py test_project.py transformer tokenizer

      - name: Run test suite
        run: |
          pytest -q test_project.py

